<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0b0b"/>

  <!-- Sun -->
  <circle cx="600" cy="150" r="70" fill="#FFD54A"/>

  <!-- Quote -->
  <text
      x="600"
      y="300"
      text-anchor="middle"
      fill="#FFD54A"
      font-family="Arial"
      font-size="30"
      font-weight="bold">

      Technology is making humans machines.

      <animate
          attributeName="opacity"
          values="1;0.25;1"
          dur="2.5s"
          repeatCount="indefinite"/>
  </text>

</svg>